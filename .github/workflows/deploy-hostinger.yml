name: Deploy to Hostinger

on:
  # Hostinger for fixmyhome.pro is managed Node.js hosting, not a Docker VPS.
  # Production deploys are currently done by uploading a locally built Next.js
  # standalone bundle over SSH. Keep this workflow manual-only so normal pushes
  # do not run the obsolete Docker deployment and send failure emails.
  workflow_dispatch:

jobs:
  deploy:
    name: Deployment notice
    runs-on: ubuntu-latest

    steps:
      - name: Explain deployment path
        run: |
          echo "Automatic GitHub Actions deployment is disabled for fixmyhome.pro."
          echo "Hostinger is managed Node.js hosting, not a Docker VPS."
          echo "Deploy from Codex/local build by uploading the Next.js standalone bundle over SSH."