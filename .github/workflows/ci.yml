name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dailyvideoops
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d dailyvideoops"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PORT: 3000
      SESSION_SECRET: ci-session-secret
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dailyvideoops?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Sync database schema
        run: npm run db:push

      - name: Seed demo data
        run: npm run seed

      - name: Run automated app checks
        run: npm run test:all
